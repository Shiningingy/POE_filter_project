# class_hierarchy.yaml
# Authoritative item class hierarchy for the POE Filter Project.
# Data version: 3.28 (Phreecia / Keepers of the Void)
#
# REMOVED vs earlier data: Breachstones, Sentinel Drones, Memories
# ADDED vs earlier data:   Idols (6 bases), Wombgifts (4 bases)
#
# Schema:
#   Intermediate nodes: id, label_en, label_ch, optional properties/flags/constraints, children
#   Leaf nodes:         poe_class (exact BaseTypes.csv Class value), label_en, optional label_ch,
#                       optional properties/flags/constraints   — NO children field
#
# Inheritance: a leaf's EFFECTIVE properties/flags = its own + all ancestors', deduplicated.
# Resolved at load time by the backend loader (load_class_hierarchy in main.py).

hierarchy:
  - id: equipment
    label_en: "Equipment"
    label_ch: "装备"
    properties: [itemLevel, dropLevel, rarity, quality]
    flags: [identified, corrupted, mirrored]
    children:
      - id: weapons
        label_en: "Weapons"
        label_ch: "武器"
        flags: [fractured, synthesised, shaper, elder]
        children:
          - id: one_handed_weapons
            label_en: "One Handed Weapons"
            label_ch: "单手武器"
            properties: [sockets, linkedSockets]
            constraints: {max_sockets: 3}
            children:
              - {poe_class: "One Hand Swords",         label_en: "One Hand Swords",         label_ch: "单手剑"}
              - {poe_class: "Thrusting One Hand Swords", label_en: "Thrusting One Hand Swords", label_ch: "刺击单手剑"}
              - {poe_class: "One Hand Axes",           label_en: "One Hand Axes",           label_ch: "单手斧"}
              - {poe_class: "One Hand Maces",          label_en: "One Hand Maces",          label_ch: "单手锤"}
              - {poe_class: "Claws",                   label_en: "Claws",                   label_ch: "爪"}
              - {poe_class: "Daggers",                 label_en: "Daggers",                 label_ch: "匕首"}
              - {poe_class: "Rune Daggers",            label_en: "Rune Daggers",            label_ch: "符文匕首"}
              - {poe_class: "Wands",                   label_en: "Wands",                   label_ch: "魔杖"}
              - {poe_class: "Sceptres",                label_en: "Sceptres",                label_ch: "节杖"}
          - id: two_handed_weapons
            label_en: "Two Handed Weapons"
            label_ch: "双手武器"
            properties: [sockets, linkedSockets]
            constraints: {max_sockets: 6}
            children:
              - {poe_class: "Two Hand Swords", label_en: "Two Hand Swords", label_ch: "双手剑"}
              - {poe_class: "Two Hand Axes",   label_en: "Two Hand Axes",   label_ch: "双手斧"}
              - {poe_class: "Two Hand Maces",  label_en: "Two Hand Maces",  label_ch: "双手锤"}
              - {poe_class: "Bows",            label_en: "Bows",            label_ch: "弓"}
              - {poe_class: "Staves",          label_en: "Staves",          label_ch: "法杖"}
              - {poe_class: "Warstaves",       label_en: "Warstaves",       label_ch: "战法杖"}

      - id: armour
        label_en: "Armour"
        label_ch: "防具"
        properties: [sockets, linkedSockets]
        flags: [fractured, synthesised, shaper, elder]
        children:
          - {poe_class: "Body Armours", label_en: "Body Armours", label_ch: "身体护甲", constraints: {max_sockets: 6}}
          - {poe_class: "Helmets",      label_en: "Helmets",      label_ch: "头盔",     constraints: {max_sockets: 4}}
          - {poe_class: "Gloves",       label_en: "Gloves",       label_ch: "手套",     constraints: {max_sockets: 4}}
          - {poe_class: "Boots",        label_en: "Boots",        label_ch: "靴子",     constraints: {max_sockets: 4}}
          - {poe_class: "Shields",      label_en: "Shields",      label_ch: "盾牌",     constraints: {max_sockets: 3}}
          - {poe_class: "Quivers",      label_en: "Quivers",      label_ch: "箭袋",     constraints: {max_sockets: 0}}

      - id: jewellery
        label_en: "Jewellery"
        label_ch: "首饰"
        flags: [fractured, synthesised, shaper, elder]
        children:
          - {poe_class: "Amulets", label_en: "Amulets", label_ch: "护身符"}
          - {poe_class: "Rings",   label_en: "Rings",   label_ch: "戒指"}
          - {poe_class: "Belts",   label_en: "Belts",   label_ch: "腰带"}

  - id: currency
    label_en: "Currency"
    label_ch: "通货"
    children:
      - {poe_class: "Stackable Currency",                  label_en: "Stackable Currency",                  label_ch: "可叠加通货",       properties: [stackSize]}
      - {poe_class: "Gold",                                label_en: "Gold",                                label_ch: "金币",             properties: [stackSize]}
      - {poe_class: "Delve Stackable Socketable Currency", label_en: "Delve Stackable Socketable Currency", label_ch: "挖矿可叠加通货",   properties: [stackSize]}

  - id: gems
    label_en: "Gems"
    label_ch: "宝石"
    children:
      - {poe_class: "Skill Gems",   label_en: "Skill Gems",   label_ch: "技能宝石", properties: [quality, gemLevel], flags: [corrupted]}
      - {poe_class: "Support Gems", label_en: "Support Gems", label_ch: "辅助宝石", properties: [quality, gemLevel], flags: [corrupted]}

  - id: maps
    label_en: "Maps"
    label_ch: "地图"
    children:
      - {poe_class: "Maps",          label_en: "Maps",          label_ch: "地图",   properties: [itemLevel, mapTier, quality], flags: [identified, corrupted, mirrored]}
      - {poe_class: "Map Fragments", label_en: "Map Fragments", label_ch: "地图碎片", properties: [stackSize]}

  - id: flasks
    label_en: "Flasks"
    label_ch: "药剂"
    properties: [itemLevel, dropLevel, rarity, quality]
    flags: [identified, corrupted, mirrored]
    children:
      - {poe_class: "Life Flasks",    label_en: "Life Flasks",    label_ch: "生命药剂"}
      - {poe_class: "Mana Flasks",    label_en: "Mana Flasks",    label_ch: "魔力药剂"}
      - {poe_class: "Utility Flasks", label_en: "Utility Flasks", label_ch: "功能药剂"}
      - {poe_class: "Hybrid Flasks",  label_en: "Hybrid Flasks",  label_ch: "混合药剂"}

  - id: jewels
    label_en: "Jewels"
    label_ch: "珠宝"
    properties: [itemLevel, dropLevel, rarity]
    flags: [identified, corrupted, mirrored, fractured, synthesised]
    children:
      - {poe_class: "Jewels",       label_en: "Jewels",       label_ch: "珠宝"}
      - {poe_class: "Abyss Jewels", label_en: "Abyss Jewels", label_ch: "深渊珠宝"}

  - id: divination
    label_en: "Divination Cards"
    label_ch: "命运之牌"
    children:
      - {poe_class: "Divination Cards", label_en: "Divination Cards", label_ch: "命运之牌", properties: [stackSize]}

  - id: misc
    label_en: "Miscellaneous"
    label_ch: "杂项"
    children:
      - id: heist
        label_en: "Heist"
        label_ch: "盗贼"
        children:
          - {poe_class: "Heist Brooches", label_en: "Heist Brooches", label_ch: "盗贼胸针"}
          - {poe_class: "Heist Cloaks",   label_en: "Heist Cloaks",   label_ch: "盗贼斗篷"}
          - {poe_class: "Heist Gear",     label_en: "Heist Gear",     label_ch: "盗贼装备"}
          - {poe_class: "Heist Targets",  label_en: "Heist Targets",  label_ch: "盗贼目标"}
          - {poe_class: "Heist Tools",    label_en: "Heist Tools",    label_ch: "盗贼工具"}
          - {poe_class: "Blueprints",     label_en: "Blueprints",     label_ch: "蓝图"}
          - {poe_class: "Contracts",      label_en: "Contracts",      label_ch: "合同"}

      - id: league_content
        label_en: "League Content"
        label_ch: "联赛内容"
        children:
          - {poe_class: "Idols",               label_en: "Idols",               label_ch: "神像",     properties: [itemLevel]}   # 3.28 Phreecia league
          - {poe_class: "Wombgifts",           label_en: "Wombgifts",           label_ch: "子宫礼物", properties: [itemLevel]}   # 3.28 Keepers of the Void
          - {poe_class: "Sanctum Research",    label_en: "Sanctum Research",    label_ch: "圣所研究"}
          - {poe_class: "Relics",              label_en: "Relics",              label_ch: "遗物"}
          - {poe_class: "Sanctified Relics",   label_en: "Sanctified Relics",   label_ch: "神圣遗物"}
          - {poe_class: "Tinctures",           label_en: "Tinctures",           label_ch: "酊剂"}
          - {poe_class: "Charms",              label_en: "Charms",              label_ch: "护符"}
          - {poe_class: "Trinkets",            label_en: "Trinkets",            label_ch: "饰品"}
          - {poe_class: "Incursion Items",     label_en: "Incursion Items",     label_ch: "侵略物品"}
          - {poe_class: "Expedition Logbooks", label_en: "Expedition Logbooks", label_ch: "探险日志", properties: [stackSize]}

      - id: atlas
        label_en: "Atlas & Endgame"
        label_ch: "地图集"
        children:
          - {poe_class: "Atlas Upgrade Items", label_en: "Atlas Upgrade Items", label_ch: "地图集升级物品"}
          - {poe_class: "Misc Map Items",      label_en: "Misc Map Items",      label_ch: "杂项地图物品"}
          - {poe_class: "Vault Keys",          label_en: "Vault Keys",          label_ch: "金库钥匙"}
          - {poe_class: "Pieces",              label_en: "Pieces",              label_ch: "碎片"}

      - id: other
        label_en: "Other"
        label_ch: "其他"
        children:
          - {poe_class: "Corpses",           label_en: "Corpses",           label_ch: "尸体"}
          - {poe_class: "Fishing Rods",      label_en: "Fishing Rods",      label_ch: "钓鱼竿"}
          - {poe_class: "Incubators",        label_en: "Incubators",        label_ch: "孵化器"}
          - {poe_class: "Labyrinth Items",   label_en: "Labyrinth Items",   label_ch: "迷宫物品"}
          - {poe_class: "Labyrinth Trinkets", label_en: "Labyrinth Trinkets", label_ch: "迷宫饰品"}
          - {poe_class: "Quest Items",       label_en: "Quest Items",       label_ch: "任务物品"}
